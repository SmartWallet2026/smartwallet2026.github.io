name: Auto Publish Blog Poston:  schedule:    - cron: '0 1 * * 1,4'→ Runs at 01:00, only on Monday and Thursday  workflow_dispatch:jobs:  publish-post:    runs-on: ubuntu-latest    permissions:      contents: write    steps:      - name: Checkout repository        uses: actions/checkout@v4        with:          token: ${{ secrets.GITHUB_TOKEN }}      - name: Set up Python 3.11        uses: actions/setup-python@v5        with:          python-version: '3.11'      - name: Install dependencies        run: pip install -r requirements.txt      - name: Generate new blog post        env:          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}        run: python generate_post_sdk.py      - name: Update sitemap.xml        run: python update_sitemap.py      - name: Commit and push new post
