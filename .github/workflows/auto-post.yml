name: Auto Publish Blog Post

on:
  schedule:
    - cron: '0 1 * * 1,4'   # 08:00 sáng UTC+7, Thứ 2 & Thứ 5
  workflow_dispatch:

jobs:
  publish-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate new blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_post.py

      - name: Update sitemap.xml
        run: python update_sitemap.py

      - name: Commit and push new post
        run: |
          git config --global user.name "SmartWallet Bot"
          git config --global user.email "bot@smartwallet2026.github.io"
          git add posts/ sitemap.xml post_topics.json
          git diff --staged --quiet || git commit -m "Auto-publish: new blog post $(date +'%Y-%m-%d')"
          git push
